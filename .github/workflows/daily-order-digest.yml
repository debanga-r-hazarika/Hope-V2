# Runs the order daily digest at 11:30 PM IST (18:00 UTC) every day.
# Add these secrets in GitHub: Settings → Secrets and variables → Actions
#   - SUPABASE_PROJECT_REF: your project ref (e.g. abcdefghij from https://abcdefghij.supabase.co)
#   - SUPABASE_ANON_KEY: your anon/public key from Supabase → Project Settings → API

name: Daily order digest

on:
  schedule:
    # 18:00 UTC = 11:30 PM IST (same day)
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow "Run workflow" manually for testing

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger order-daily-digest
        run: |
          URL="https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/order-daily-digest"
          echo "Calling $URL"
          curl -sS -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{}'
          echo ""
